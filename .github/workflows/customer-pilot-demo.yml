name: Customer Pilot Demo
on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: customer-pilot-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout greentic-pack dependency
        uses: actions/checkout@v4
        with:
          repository: greenticai/greentic-pack
          path: .greentic-deps/greentic-pack
      - name: Link greentic-pack dependency
        run: ln -s "$GITHUB_WORKSPACE/.greentic-deps/greentic-pack" "$GITHUB_WORKSPACE/../greentic-pack"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dry-run single transaction
        run: |
          cargo run -p greentic-operax --bin greentic-operax -- run examples/tenancy/handoff \
            --tenant demo-tenant \
            --team property-ops \
            --sorx-url http://localhost:8088 \
            --input examples/tenancy/banking/one-transaction.json \
            --dry-run \
            --json
      - name: Dry-run daily batch
        run: |
          cargo run -p greentic-operax --bin greentic-operax -- run examples/tenancy/handoff \
            --tenant demo-tenant \
            --team property-ops \
            --sorx-url http://localhost:8088 \
            --input examples/tenancy/banking/daily-transactions.json \
            --dry-run \
            --json
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: operax-demo-artifacts
          path: |
            target/operax
            examples/tenancy
          if-no-files-found: ignore
