name: Nightly Coverage
on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: read

concurrency:
  group: nightly-coverage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: rustup component add llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall
      - name: Install coverage tools
        run: |
          cargo binstall -y cargo-nextest
          cargo binstall -y cargo-llvm-cov
          cargo binstall -y greentic-dev
      - run: greentic-dev coverage --policy-file coverage-policy.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-coverage-report
          path: target/coverage/coverage.json
          if-no-files-found: ignore
