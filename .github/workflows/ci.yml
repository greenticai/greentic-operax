name: CI
on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout greentic-pack dependency
        uses: actions/checkout@v4
        with:
          repository: greenticai/greentic-pack
          path: .greentic-deps/greentic-pack
      - name: Link greentic-pack dependency
        run: ln -s "$GITHUB_WORKSPACE/.greentic-deps/greentic-pack" "$GITHUB_WORKSPACE/../greentic-pack"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: bash ci/local_check.sh
